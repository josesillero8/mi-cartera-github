name: Actualizar precios

on:
  schedule:
    # Cada 15 minutos aprox., en horario de mercado (7:00-22:00 UTC, L-V).
    # Los minutos "7, 22, 37, 52" (en vez de 0, 15, 30, 45) evitan las horas
    # en punto, que son las que más carga tienen en GitHub y más retrasan
    # o descartan los workflows programados.
    - cron: "7,22,37,52 7-22 * * 1-5"
  workflow_dispatch: {}   # te permite lanzarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Consultar precios
        run: python scripts/fetch_prices.py

      - name: Guardar cambios
        run: |
          git config user.name "portfolio-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.json data/history.json
          git diff --quiet --cached || git commit -m "Actualizar precios $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
