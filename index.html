<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F4FA;
    --card:#FFFFFF;
    --card-alt:#F1EFFA;
    --purple:#6C5CE7;
    --purple-soft:#EDEAFB;
    --purple-dark:#4B3FC4;
    --text:#14142B;
    --text-dim:#6F6F87;
    --text-faint:#A3A1B8;
    --border:#EEECF7;
    --green:#1AAE68;
    --green-soft:#E4F8EE;
    --red:#F0506E;
    --red-soft:#FDEAEF;
    --shadow:0 6px 20px rgba(20,20,43,0.06);
    --shadow-lg:0 12px 30px rgba(108,92,231,0.28);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  #app{
    background:var(--bg);
    min-height:100%;
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
  }
  .phone{width:100%;max-width:480px;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;}

  /* ===== Topbar ===== */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 8px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .mono{width:30px;height:30px;border-radius:9px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;}
  .brand-title{font-size:14px;font-weight:700;}
  .sync-status{font-size:10.5px;color:var(--green);display:flex;align-items:center;gap:5px;font-weight:600;}
  .sync-status.offline{color:var(--text-faint);}
  .dot-live{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}

  /* ===== Hero ===== */
  .hero{padding:10px 20px 6px;}
  .hero-label{font-size:12.5px;color:var(--text-dim);margin:0 0 6px;font-weight:500;}
  .hero-value-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .hero-value{font-weight:800;font-size:36px;letter-spacing:-0.02em;color:var(--text);margin:0;font-variant-numeric:tabular-nums;line-height:1;}
  .hero-change{font-size:12.5px;font-weight:700;padding:5px 10px;border-radius:20px;white-space:nowrap;}
  .hero-change.pos{color:var(--green);background:var(--green-soft);}
  .hero-change.neg{color:var(--red);background:var(--red-soft);}
  .hero-change.flat{color:var(--text-faint);background:var(--card-alt);}

  /* ===== Favourites row ===== */
  .fav-scroll{display:flex;gap:12px;overflow-x:auto;padding:16px 20px 4px;scrollbar-width:none;}
  .fav-scroll::-webkit-scrollbar{display:none;}
  .fav-card{flex:0 0 auto;width:150px;border-radius:20px;padding:16px;box-shadow:var(--shadow);}
  .fav-name{font-size:12.5px;font-weight:700;margin:0 0 10px;display:flex;align-items:center;gap:6px;}
  .fav-mono{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
  .fav-spark{margin:4px 0 10px;}
  .fav-price{font-size:15px;font-weight:800;margin:0 0 3px;font-variant-numeric:tabular-nums;}
  .fav-change{font-size:11px;font-weight:700;}

  /* ===== Content ===== */
  .content-scroll{flex:1;padding:20px 20px 104px;}
  .section-label{font-size:14px;font-weight:700;margin:2px 0 14px;color:var(--text);}
  .tab-content{opacity:1;transform:translateY(0);transition:opacity 0.22s ease, transform 0.22s ease;}
  .tab-content.entering{opacity:0;transform:translateY(8px);}
  .empty{text-align:center;padding:60px 20px;color:var(--text-faint);font-size:13.5px;}

  /* ===== Bottom nav ===== */
  .bottom-nav{
    position:sticky;bottom:0;left:0;right:0;display:flex;background:rgba(255,255,255,0.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--border);padding:9px 4px calc(9px + env(safe-area-inset-bottom));z-index:20;
    box-shadow:0 -4px 20px rgba(20,20,43,0.04);
  }
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;padding:6px 4px;cursor:pointer;color:var(--text-faint);}
  .nav-item svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s;}
  .nav-item span{font-size:10px;font-weight:600;}
  .nav-item.active{color:var(--purple);}

  .fab{
    position:fixed;left:50%;bottom:74px;width:54px;height:54px;border-radius:50%;
    background:var(--purple);color:#fff;border:none;display:flex;align-items:center;justify-content:center;
    font-size:26px;font-weight:400;cursor:pointer;box-shadow:var(--shadow-lg);z-index:25;transition:transform 0.12s ease;
  }
  .fab:active{transform:translateX(-50%) scale(0.92);}

  /* ===== Accordion ===== */
  .acc-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows 0.28s ease;}
  .acc-wrap.open{grid-template-rows:1fr;}
  .acc-inner{overflow:hidden;}

  /* Assets list (Noticias) */
  .move-row{background:var(--card);border-radius:18px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
  .move-head{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
  .move-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
  .move-id{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .move-name{font-size:13.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .move-tag{font-size:11px;color:var(--text-faint);font-weight:500;}
  .move-tag.auto{color:var(--purple);}
  .move-num{text-align:right;}
  .move-price{font-size:13.5px;color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
  .move-change{font-size:10.5px;margin-top:3px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;}
  .move-change.pos{color:var(--green);background:var(--green-soft);}
  .move-change.neg{color:var(--red);background:var(--red-soft);}
  .move-change.flat{color:var(--text-faint);background:var(--card-alt);}
  .move-chevron{color:var(--text-faint);transition:transform 0.22s ease;}
  .move-row.open .move-chevron{transform:rotate(90deg);}
  .move-detail-content{padding:14px 16px 18px;border-top:1px solid var(--border);}
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .detail-item-label{font-size:10.5px;color:var(--text-faint);margin-bottom:5px;font-weight:500;}
  .detail-item-value{font-size:13.5px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}

  /* Evolucion */
  .evo-toggle{display:flex;gap:8px;margin-bottom:16px;background:var(--card-alt);padding:4px;border-radius:14px;width:fit-content;}
  .evo-btn{padding:7px 16px;border:none;background:none;border-radius:10px;font-size:12px;font-weight:700;color:var(--text-dim);cursor:pointer;}
  .evo-btn.active{background:var(--card);color:var(--purple);box-shadow:0 2px 8px rgba(20,20,43,0.08);}
  .evo-chart-wrap{background:var(--card);border-radius:20px;padding:18px 18px;margin-bottom:18px;box-shadow:var(--shadow);}
  .evo-chart-label{font-size:11.5px;color:var(--text-dim);font-weight:600;margin:0 0 12px;}
  .evo-row{background:var(--card);border-radius:16px;margin-bottom:9px;overflow:hidden;box-shadow:var(--shadow);}
  .evo-row-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;gap:10px;}
  .evo-name{font-size:13.5px;font-weight:700;color:var(--text);}
  .evo-metrics{display:flex;gap:14px;align-items:center;font-size:12px;font-variant-numeric:tabular-nums;}
  .evo-metric{text-align:right;}
  .evo-metric-label{font-size:9.5px;color:var(--text-faint);margin-bottom:2px;font-weight:500;}
  .evo-chevron{color:var(--text-faint);transition:transform 0.22s ease;}
  .evo-row.open .evo-chevron{transform:rotate(90deg);}
  .evo-detail-content{padding:14px 16px 18px;border-top:1px solid var(--border);}
  .no-data{font-size:11.5px;color:var(--text-faint);}

  /* Tabla / KPIs / Donut */
  .kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .kpi-card{background:var(--card);border-radius:16px;padding:13px 15px;box-shadow:var(--shadow);}
  .kpi-label{font-size:10.5px;color:var(--text-faint);margin:0 0 6px;font-weight:500;}
  .kpi-value{font-weight:800;font-size:16px;color:var(--text);margin:0;font-variant-numeric:tabular-nums;}
  .kpi-value.pos{color:var(--green);}
  .kpi-value.neg{color:var(--red);}
  .kpi-clear{grid-column:1/-1;font-size:12px;font-weight:700;color:var(--purple);background:var(--purple-soft);border:none;border-radius:12px;padding:9px 12px;cursor:pointer;}
  .kpi-clear:active{opacity:0.8;}

  .donut-section{display:flex;flex-direction:column;gap:18px;margin-bottom:20px;background:var(--card);border-radius:20px;padding:20px 18px;box-shadow:var(--shadow);}
  .donut-svg-wrap{position:relative;align-self:center;}
  .donut-seg{cursor:pointer;transition:opacity 0.15s;}
  .donut-seg.dim{opacity:0.25;}
  .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:110px;}
  .donut-center-label{font-size:9.5px;color:var(--text-faint);margin:0 0 5px;font-weight:500;}
  .donut-center-value{font-size:14.5px;font-weight:800;color:var(--text);margin:0;line-height:1.2;}
  .donut-legend{display:flex;flex-direction:column;gap:3px;}
  .legend-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:12px;cursor:pointer;font-size:12.5px;}
  .legend-item.active{background:var(--purple-soft);}
  .legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
  .legend-name{flex:1;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .legend-pct{color:var(--text-dim);font-size:11.5px;font-weight:600;font-variant-numeric:tabular-nums;}

  tr.row-selected td{background:var(--purple-soft);}
  tr.row-dim td{opacity:0.4;}
  .table-wrap{overflow-x:auto;background:var(--card);border-radius:16px;box-shadow:var(--shadow);-webkit-overflow-scrolling:touch;}
  table.data-table{width:100%;border-collapse:collapse;font-size:12px;}
  table.data-table thead th{text-align:right;padding:12px 13px;font-size:10px;color:var(--text-faint);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;font-weight:700;position:sticky;top:0;background:var(--card);}
  table.data-table th:first-child, table.data-table td:first-child{text-align:left;}
  table.data-table th.sorted{color:var(--purple);}
  table.data-table td{padding:11px 13px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--text);font-weight:600;}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  table.data-table tfoot td{border-top:1px solid var(--border);font-weight:800;color:var(--text);}
  .pos{color:var(--green);}
  .neg{color:var(--red);}

  /* ===== Bottom sheet modal ===== */
  .sheet-overlay{position:fixed;inset:0;background:rgba(20,20,43,0);z-index:50;display:none;transition:background 0.25s ease;}
  .sheet-overlay.open{display:block;background:rgba(20,20,43,0.45);}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,100%);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
    background:#fff;border-radius:24px 24px 0 0;transition:transform 0.3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom);}
  .sheet-overlay.open .sheet{transform:translate(-50%,0);}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 4px;}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 16px;}
  .sheet-head h2{font-size:16px;font-weight:800;margin:0;}
  .sheet-close{background:var(--card-alt);border:none;border-radius:50%;width:28px;height:28px;color:var(--text-dim);cursor:pointer;font-size:14px;}
  .sheet-body{padding:0 20px 24px;}

  .form-title{font-size:12.5px;font-weight:700;margin:0 0 12px;color:var(--text);}
  .mode-toggle{display:flex;gap:8px;margin-bottom:16px;background:var(--card-alt);padding:4px;border-radius:14px;}
  .mode-btn{flex:1;padding:9px 4px;border:none;background:none;border-radius:10px;font-size:11px;font-weight:700;color:var(--text-dim);cursor:pointer;}
  .mode-btn.active{background:#fff;color:var(--purple);box-shadow:0 2px 8px rgba(20,20,43,0.08);}
  form{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end;}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:5px;}
  .field input, .field select{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:12px;background:var(--card-alt);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;}
  .field input:focus, .field select:focus{outline:none;border-color:var(--purple);background:#fff;}
  button.add-btn{grid-column:1/-1;padding:13px 18px;background:var(--purple);color:#fff;border:none;border-radius:14px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;box-shadow:0 8px 18px rgba(108,92,231,0.3);}
  button.add-btn:active{opacity:0.88;}
  .form-error{grid-column:1/-1;color:var(--red);font-size:12px;margin-top:4px;font-weight:600;}
  .empty-isin-note{font-size:12px;color:var(--text-faint);margin:4px 0 0;}
  .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
  .bulk-hint{font-size:12px;color:var(--text-dim);margin:0 0 8px;line-height:1.5;}
  .bulk-format{font-size:11px;color:var(--purple);margin:0 0 10px;font-weight:600;}
  .bulk-format code{background:var(--card-alt);padding:2px 6px;border-radius:5px;}
  #bulk-input{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:12px;background:var(--card-alt);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;resize:vertical;}
  .bulk-actions{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap;}
  #bulk-feedback{font-size:11.5px;color:var(--text-dim);font-weight:600;}
  #bulk-feedback.ok{color:var(--green);}
  #bulk-feedback.err{color:var(--red);}

  @media (min-width:540px){ .fab{left:calc(50% + 200px);} }
</style>

<div id="app">
  <div class="phone">
    <div class="topbar">
      <div class="brand"><div class="mono">MC</div><span class="brand-title">Mi Cartera</span></div>
      <p class="sync-status" id="sync-status"></p>
    </div>

    <div class="hero">
      <p class="hero-label">Valor total de tu cartera</p>
      <div class="hero-value-row">
        <p class="hero-value" id="hero-value">—</p>
        <span class="hero-change" id="hero-change"></span>
      </div>
    </div>

    <div class="fav-scroll" id="fav-scroll"></div>

    <div class="content-scroll">
      <p class="section-label" id="section-label">Tus acciones</p>
      <div class="tab-content" id="tab-content"></div>
    </div>

    <button class="fab" id="open-modal-btn">+</button>

    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="noticias">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span>Noticias</span>
      </button>
      <button class="nav-item" data-tab="evolucion">
        <svg viewBox="0 0 24 24"><path d="M4 17l5-5 4 4 7-9"/><path d="M15 7h5v5"/></svg>
        <span>Evolución</span>
      </button>
      <button class="nav-item" data-tab="tabla">
        <svg viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="15" rx="3"/><path d="M3.5 9.5h17M9 4.5v15"/></svg>
        <span>Tabla</span>
      </button>
    </nav>
  </div>

  <div class="sheet-overlay" id="modal-overlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head"><h2>Añadir operación</h2><button class="sheet-close" id="modal-close-btn">&times;</button></div>
      <div class="sheet-body">
        <div class="mode-toggle">
          <button type="button" class="mode-btn active" id="mode-new-btn">Nueva</button>
          <button type="button" class="mode-btn" id="mode-existing-btn">Ampliar</button>
          <button type="button" class="mode-btn" id="mode-sell-btn">Vender</button>
          <button type="button" class="mode-btn" id="mode-div-btn">Dividendo</button>
        </div>

        <form id="txn-form-new">
          <div class="field"><label>Nombre</label><input type="text" id="fn-ticker" placeholder="Ej. Inditex" required></div>
          <div class="field"><label>ISIN</label><input type="text" id="fn-isin" placeholder="Ej. ES0148396007" maxlength="12" required style="text-transform:uppercase;"></div>
          <div class="field"><label>Fecha</label><input type="date" id="fn-date" required></div>
          <div class="field"><label>Nº acciones</label><input type="number" id="fn-shares" step="any" min="0" placeholder="0" required></div>
          <div class="field"><label>Precio compra (€)</label><input type="number" id="fn-price" step="any" min="0" placeholder="0.00" required></div>
          <div class="field"><label>Comisión (€)</label><input type="number" id="fn-commission" step="any" min="0" placeholder="0.00" value="0"></div>
          <button type="submit" class="add-btn">Añadir</button>
          <div class="form-error" id="form-error-new" style="display:none;"></div>
        </form>

        <form id="txn-form-existing" style="display:none;">
          <div class="field" style="grid-column:1/-1;"><label>Acción (por ISIN)</label><select id="fe-isin" required></select></div>
          <div class="field"><label>Fecha</label><input type="date" id="fe-date" required></div>
          <div class="field"><label>Nº acciones</label><input type="number" id="fe-shares" step="any" min="0" placeholder="0" required></div>
          <div class="field"><label>Precio compra (€)</label><input type="number" id="fe-price" step="any" min="0" placeholder="0.00" required></div>
          <div class="field"><label>Comisión (€)</label><input type="number" id="fe-commission" step="any" min="0" placeholder="0.00" value="0"></div>
          <button type="submit" class="add-btn">Añadir</button>
          <div class="form-error" id="form-error-existing" style="display:none;"></div>
        </form>

        <form id="txn-form-sell" style="display:none;">
          <div class="field" style="grid-column:1/-1;"><label>Acción (por ISIN)</label><select id="fs-isin" required></select></div>
          <p class="empty-isin-note" id="sell-holdings-note" style="grid-column:1/-1;margin:-4px 0 4px;"></p>
          <div class="field"><label>Fecha de venta</label><input type="date" id="fs-date" required></div>
          <div class="field"><label>Nº acciones a vender</label><input type="number" id="fs-shares" step="any" min="0" placeholder="0" required></div>
          <div class="field"><label>Precio venta (€)</label><input type="number" id="fs-price" step="any" min="0" placeholder="0.00" required></div>
          <div class="field"><label>Comisión (€)</label><input type="number" id="fs-commission" step="any" min="0" placeholder="0.00" value="0"></div>
          <button type="submit" class="add-btn" style="background:var(--red);box-shadow:0 8px 18px rgba(240,80,110,0.28);">Registrar venta</button>
          <div class="form-error" id="form-error-sell" style="display:none;"></div>
          <p class="empty-isin-note" id="wash-sale-warning" style="grid-column:1/-1;display:none;color:var(--red);font-weight:600;"></p>
        </form>

        <form id="txn-form-div" style="display:none;">
          <div class="field" style="grid-column:1/-1;"><label>Acción (por ISIN)</label><select id="fd-isin" required></select></div>
          <div class="field"><label>Fecha de cobro</label><input type="date" id="fd-date" required></div>
          <div class="field"><label>Importe neto recibido (€)</label><input type="number" id="fd-amount" step="any" min="0" placeholder="0.00" required></div>
          <button type="submit" class="add-btn" style="background:var(--green);box-shadow:0 8px 18px rgba(26,174,104,0.28);">Registrar dividendo</button>
          <div class="form-error" id="form-error-div" style="display:none;"></div>
        </form>

        <p class="empty-isin-note" id="empty-isin-note" style="display:none;">Todavía no tienes ninguna acción registrada con ISIN. Usa "Nueva" primero.</p>

        <hr class="divider">

        <p class="form-title">Cargar posiciones que ya tienes</p>
        <p class="bulk-hint">Una línea por acción, con lo que tienes ahora mismo.</p>
        <p class="bulk-format">Formato: <code>Nombre; nº acciones; precio medio; ISIN (opcional)</code></p>
        <textarea id="bulk-input" rows="4" placeholder="Inditex; 12; 34.50; ES0148396007"></textarea>
        <div class="bulk-actions">
          <button type="button" class="add-btn" id="bulk-import-btn" style="width:auto;">Importar</button>
          <span id="bulk-feedback"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  let state = { transactions: [], currentPrices: {}, dividends: [], notes: {} };
  let remotePrices = null;
  let remoteHistory = null;
  let activeTab = 'noticias';
  let openMoveRows = new Set();
  let evoRange = 'general';
  let openEvoRows = new Set();
  let tableSort = { key: 'totalCost', dir: -1 };
  let selectedKey = null;
  const PALETTE = ['#6C5CE7','#00B894','#E17055','#0984E3','#FDCB6E','#E84393','#00CEC9','#636E72','#A29BFE','#55EFC4'];
  const SECTION_LABELS = { noticias:'Tus acciones', evolucion:'Evolución', tabla:'Resumen' };

  const fmtMoney = n => (isFinite(n)?n:0).toLocaleString('es-ES',{style:'currency',currency:'EUR'});
  const fmtPct = n => (isFinite(n)?n:0).toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';
  const fmtNum = n => (isFinite(n)?n:0).toLocaleString('es-ES',{maximumFractionDigits:4});
  const escapeHtml = s => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };
  const colorFor = key => PALETTE[Math.abs(hashCode(key)) % PALETTE.length];
  function hashCode(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return h; }
  const initialsFor = name => name.trim().slice(0,2).toUpperCase();

  async function loadState(){
    try{
      const res = await window.storage.get('portfolio-data', false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state.transactions = parsed.transactions || [];
        state.currentPrices = parsed.currentPrices || {};
        state.dividends = parsed.dividends || [];
        state.notes = parsed.notes || {};
      }
    }catch(e){}
    await fetchRemoteData();
    render();
    setInterval(async ()=>{ await fetchRemoteData(); render(); }, 5*60*1000);
  }

  async function saveState(){
    try{ await window.storage.set('portfolio-data', JSON.stringify(state), false); }
    catch(e){ console.error('Error guardando', e); }
  }

  async function fetchRemoteData(){
    try{
      const [pRes, hRes] = await Promise.all([
        fetch('./data/prices.json', {cache:'no-store'}),
        fetch('./data/history.json', {cache:'no-store'})
      ]);
      if(pRes.ok) remotePrices = await pRes.json();
      if(hRes.ok) remoteHistory = await hRes.json();
    }catch(e){ remotePrices = null; remoteHistory = null; }
    updateSyncStatus();
  }

  function updateSyncStatus(){
    const el = document.getElementById('sync-status');
    if(remotePrices && Object.keys(remotePrices).length){
      const times = Object.values(remotePrices).map(p=>new Date(p.updated).getTime()).filter(Boolean);
      const latest = times.length ? new Date(Math.max(...times)) : null;
      const mins = latest ? Math.max(0, Math.round((Date.now()-latest.getTime())/60000)) : null;
      el.innerHTML = '<span class="dot-live"></span><span>'+(mins!==null?'hace '+mins+' min':'activo')+'</span>';
      el.className = 'sync-status';
    } else {
      el.textContent = 'Sin conexión';
      el.className = 'sync-status offline';
    }
  }

  function remotePriceFor(isin){
    if(!remotePrices || !isin) return null;
    return remotePrices[isin.toUpperCase()] || null;
  }

  function allKnownIsins(){
    const map = {};
    state.transactions.forEach(t=>{
      if(t.isin && t.isin.trim()){
        const isin = t.isin.trim().toUpperCase();
        if(!map[isin]) map[isin] = t.ticker.trim();
      }
    });
    return map;
  }

  function getPositions(){
    const map = {};
    state.transactions.forEach(t=>{
      const key = (t.isin && t.isin.trim()) ? t.isin.trim().toUpperCase() : ('noisin:'+t.ticker.trim().toLowerCase());
      if(!map[key]) map[key] = { display: t.ticker.trim(), isin: t.isin ? t.isin.trim().toUpperCase() : '', ops: [] };
      map[key].ops.push(t);
    });
    return Object.entries(map).map(([key,data])=>{
      const ops = data.ops.slice().sort((a,b)=> a.date.localeCompare(b.date));
      const buys = ops.filter(o=>o.type!=='sell');
      const sells = ops.filter(o=>o.type==='sell');

      const lots = buys.map(o=>({
        remaining: o.shares,
        costPerShare: o.price + (o.commission||0)/o.shares,
      }));
      let realizedPnl = 0;
      const washFlags = [];
      sells.forEach(s=>{
        let toSell = s.shares, costOfSold = 0;
        for(const lot of lots){
          if(toSell<=0) break;
          if(lot.remaining<=0) continue;
          const take = Math.min(lot.remaining, toSell);
          costOfSold += take*lot.costPerShare;
          lot.remaining -= take;
          toSell -= take;
        }
        const proceeds = s.shares*s.price - (s.commission||0);
        const gain = proceeds - costOfSold;
        realizedPnl += gain;
        if(gain < 0 && data.isin){
          const sellTime = new Date(s.date).getTime();
          const nearbyBuy = buys.some(b => Math.abs(new Date(b.date).getTime()-sellTime)/86400000 <= 60 && b.date !== s.date);
          if(nearbyBuy) washFlags.push(s.date);
        }
      });

      const totalShares = lots.reduce((sum,l)=>sum+l.remaining,0);
      const totalCost = lots.reduce((sum,l)=>sum+l.remaining*l.costPerShare,0);
      const avgPrice = totalShares>0 ? totalCost/totalShares : 0;
      const totalCommission = ops.reduce((s,o)=>s+(Number(o.commission)||0),0);

      const remote = data.isin ? remotePriceFor(data.isin) : null;
      const manualPrice = state.currentPrices[key];
      const hasManual = manualPrice !== undefined && manualPrice !== null && manualPrice !== '';
      const currentPrice = remote ? remote.price : (hasManual ? Number(manualPrice) : undefined);
      const isAuto = !!remote;
      const hasPrice = totalShares>0 && currentPrice !== undefined && currentPrice !== null && !isNaN(currentPrice);
      const currentValue = hasPrice ? totalShares*Number(currentPrice) : (totalShares>0 ? null : 0);
      const pnl = hasPrice ? currentValue-totalCost : null;
      const pnlPct = hasPrice && totalCost>0 ? (pnl/totalCost)*100 : null;

      const dividends = (state.dividends||[])
        .filter(d => d.isin && data.isin && d.isin.toUpperCase()===data.isin)
        .reduce((s,d)=>s+Number(d.amount||0),0);

      return {
        key, name:data.display, isin:data.isin, ops, totalShares, totalCost, avgPrice,
        currentPrice, hasPrice, isAuto, currentValue, pnl, pnlPct,
        realizedPnl, totalCommission, dividends, washFlags, isClosed: totalShares<=0 && buys.length>0
      };
    }).sort((a,b)=> b.totalCost - a.totalCost);
  }

  function historyPointsFor(isin, range){
    if(!remoteHistory || !remoteHistory.points || !isin) return [];
    let pts = remoteHistory.points.filter(pt => pt.prices && typeof pt.prices[isin] === 'number');
    if(range === 'hoy'){
      const todayStr = new Date().toDateString();
      pts = pts.filter(pt => new Date(pt.timestamp).toDateString() === todayStr);
    }
    return pts.map(pt => ({ t: pt.timestamp, v: pt.prices[isin] }));
  }

  function sparklinePath(values, w, h, pad){
    if(values.length < 2) return null;
    const min = Math.min(...values), max = Math.max(...values);
    const range = (max-min) || 1;
    const step = (w-pad*2) / (values.length-1);
    return values.map((v,i)=>{
      const x = pad + i*step;
      const y = pad + (h-pad*2) * (1 - (v-min)/range);
      return (i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
  }

  function renderSparkline(values, color, w, h){
    const pad = 3;
    const path = sparklinePath(values,w,h,pad);
    if(!path) return `<svg width="${w}" height="${h}"></svg>`;
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  function renderAreaChart(values, color, w, h){
    const pad = 10;
    if(values.length < 2) return '<p class="no-data">Todavía no hay suficientes puntos guardados para este rango.</p>';
    const min = Math.min(...values), max = Math.max(...values);
    const range = (max-min) || 1;
    const step = (w-pad*2) / (values.length-1);
    const pts = values.map((v,i)=>[pad+i*step, pad+(h-pad*2)*(1-(v-min)/range)]);
    const linePath = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
    const gid = 'g'+Math.random().toString(36).slice(2,8);
    return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.20"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      ${[0.25,0.5,0.75].map(f=>`<line x1="${pad}" y1="${pad+(h-pad*2)*f}" x2="${w-pad}" y2="${pad+(h-pad*2)*f}" stroke="#EEECF7" stroke-width="1"/>`).join('')}
      <path d="${areaPath}" fill="url(#${gid})" stroke="none"/>
      <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  function renderFavourites(positions){
    const wrap = document.getElementById('fav-scroll');
    const top = positions.slice(0,5);
    if(top.length===0){ wrap.innerHTML=''; return; }
    wrap.innerHTML = top.map(p=>{
      const color = colorFor(p.key);
      const sparkValues = p.isin ? historyPointsFor(p.isin,'general').map(pt=>pt.v).slice(-24) : [];
      const changeCls = !p.hasPrice ? 'flat' : (p.pnlPct>=0?'pos':'neg');
      const changeTxt = !p.hasPrice ? 'Sin precio' : (p.pnlPct>=0?'▲ +':'▼ ')+fmtPct(Math.abs(p.pnlPct));
      return `
        <div class="fav-card" style="background:${color}15;">
          <p class="fav-name"><span class="fav-mono" style="background:${color};">${initialsFor(p.name)}</span>${escapeHtml(p.name)}</p>
          <div class="fav-spark">${renderSparkline(sparkValues, color, 118, 32)}</div>
          <p class="fav-price">${p.hasPrice?fmtMoney(p.currentPrice):'—'}</p>
          <p class="fav-change ${changeCls}" style="color:${changeCls==='pos'?'#1AAE68':changeCls==='neg'?'#F0506E':'#A3A1B8'}">${changeTxt}</p>
        </div>
      `;
    }).join('');
  }

  function render(){
    const positions = getPositions();
    const totalInvested = positions.reduce((s,p)=>s+p.totalCost,0);
    const positionsWithPrice = positions.filter(p=>p.hasPrice);
    const totalValue = positionsWithPrice.reduce((s,p)=>s+p.currentValue,0) + positions.filter(p=>!p.hasPrice).reduce((s,p)=>s+p.totalCost,0);
    const totalPnl = positionsWithPrice.reduce((s,p)=>s+p.pnl,0);
    const allHavePrice = positions.length>0 && positionsWithPrice.length===positions.length;

    document.getElementById('hero-value').textContent = positions.length ? fmtMoney(totalValue) : '—';
    const changeEl = document.getElementById('hero-change');
    if(allHavePrice){
      const pct = totalInvested>0 ? (totalPnl/totalInvested)*100 : 0;
      changeEl.textContent = (totalPnl>=0?'▲ +':'▼ ') + fmtPct(Math.abs(pct));
      changeEl.className = 'hero-change ' + (totalPnl>=0?'pos':'neg');
    } else {
      changeEl.textContent = positions.length ? 'Falta precio' : '';
      changeEl.className = 'hero-change flat';
    }

    renderFavourites(positions);

    if(document.getElementById('fe-isin')) refreshIsinSelect();

    document.getElementById('section-label').textContent = SECTION_LABELS[activeTab];
    renderActiveTab(positions);
  }

  function renderActiveTab(positions){
    positions = positions || getPositions();
    const wrap = document.getElementById('tab-content');
    wrap.classList.add('entering');
    if(activeTab === 'noticias') renderNoticias(positions);
    else if(activeTab === 'evolucion') renderEvolucion(positions);
    else renderTabla(positions);
    requestAnimationFrame(()=> requestAnimationFrame(()=> wrap.classList.remove('entering')));
  }

  function renderNoticias(positions){
    const wrap = document.getElementById('tab-content');
    if(positions.length===0){
      wrap.innerHTML = '<div class="empty">Todavía no has añadido ninguna operación. Toca el botón + para empezar.</div>';
      return;
    }
    wrap.innerHTML = positions.map(p=>{
      const open = openMoveRows.has(p.key);
      const color = colorFor(p.key);
      const changeCls = p.isClosed ? 'flat' : (!p.hasPrice ? 'flat' : (p.pnlPct>=0?'pos':'neg'));
      const changeTxt = p.isClosed ? 'Cerrada' : (!p.hasPrice ? 'Sin precio' : (p.pnlPct>=0?'+':'')+fmtPct(p.pnlPct));
      const hasWash = p.washFlags && p.washFlags.length>0;
      const noteVal = state.notes[p.key] || '';
      return `
        <div class="move-row ${open?'open':''}" data-key="${p.key}">
          <div class="move-head">
            <div class="move-icon" style="background:${color};">${initialsFor(p.name)}</div>
            <div class="move-id">
              <span class="move-name">${escapeHtml(p.name)}${hasWash?' ⚠':''}</span>
              <span class="move-tag ${p.isAuto?'auto':''}">${p.isin || 'sin ISIN'}${p.isAuto?' ⚡':''}</span>
            </div>
            <div class="move-num">
              <div class="move-price">${p.isClosed?'—':(p.hasPrice?fmtMoney(p.currentPrice):'—')}</div>
              <div class="move-change ${changeCls}">${changeTxt}</div>
            </div>
            <span class="move-chevron">&#9656;</span>
          </div>
          <div class="acc-wrap ${open?'open':''}"><div class="acc-inner"><div class="move-detail-content">
            <div class="detail-grid">
              <div><div class="detail-item-label">Acciones en cartera</div><div class="detail-item-value">${fmtNum(p.totalShares)}</div></div>
              <div><div class="detail-item-label">Precio medio</div><div class="detail-item-value">${p.totalShares>0?fmtMoney(p.avgPrice):'—'}</div></div>
              <div><div class="detail-item-label">Invertido ahora</div><div class="detail-item-value">${fmtMoney(p.totalCost)}</div></div>
              <div><div class="detail-item-label">Resultado no realizado</div><div class="detail-item-value ${p.hasPrice?(p.pnl>=0?'pos':'neg'):''}">${p.hasPrice?fmtMoney(p.pnl):'—'}</div></div>
              <div><div class="detail-item-label">Ganancia realizada</div><div class="detail-item-value ${p.realizedPnl!==0?(p.realizedPnl>=0?'pos':'neg'):''}">${fmtMoney(p.realizedPnl)}</div></div>
              <div><div class="detail-item-label">Dividendos cobrados</div><div class="detail-item-value pos">${fmtMoney(p.dividends)}</div></div>
              <div><div class="detail-item-label">Comisiones pagadas</div><div class="detail-item-value">${fmtMoney(p.totalCommission)}</div></div>
              <div><div class="detail-item-label">Operaciones</div><div class="detail-item-value">${p.ops.length}</div></div>
            </div>
            ${hasWash?`<p style="color:var(--red);font-size:11.5px;font-weight:600;margin:12px 0 0;">⚠ Alguna venta con pérdidas de esta acción tiene una compra a menos de 2 meses — revisa la regla de los 2 meses antes de declarar.</p>`:''}
            <div style="margin-top:14px;">
              <div class="detail-item-label" style="margin-bottom:6px;">Tu tesis / notas</div>
              <textarea class="note-input" data-key="${p.key}" rows="2" placeholder="¿Por qué compraste esta acción? ¿Cuál es tu objetivo?" style="width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:10px;background:var(--card-alt);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;resize:vertical;">${escapeHtml(noteVal)}</textarea>
            </div>
          </div></div></div>
        </div>
      `;
    }).join('');

    wrap.querySelectorAll('.note-input').forEach(ta=>{
      ta.addEventListener('blur', async ()=>{
        state.notes[ta.dataset.key] = ta.value;
        await saveState();
      });
      ta.addEventListener('click', e=> e.stopPropagation());
    });

    wrap.querySelectorAll('.move-head').forEach(head=>{
      head.addEventListener('click', ()=>{
        const key = head.closest('.move-row').dataset.key;
        if(openMoveRows.has(key)) openMoveRows.delete(key); else openMoveRows.add(key);
        renderActiveTab();
      });
    });
  }

  function renderEvolucion(positions){
    const wrap = document.getElementById('tab-content');
    if(positions.length===0){
      wrap.innerHTML = '<div class="empty">Todavía no has añadido ninguna operación.</div>';
      return;
    }

    const sharesByIsin = {};
    positions.forEach(p=>{ if(p.isin) sharesByIsin[p.isin] = p.totalShares; });

    let points = (remoteHistory && remoteHistory.points) || [];
    if(evoRange === 'hoy'){
      const todayStr = new Date().toDateString();
      points = points.filter(pt => new Date(pt.timestamp).toDateString() === todayStr);
    }
    const series = points.map(pt=>{
      let total = 0, any=false;
      Object.entries(pt.prices||{}).forEach(([isin, price])=>{
        const shares = sharesByIsin[isin];
        if(shares && typeof price === 'number'){ total += shares*price; any=true; }
      });
      return any ? total : null;
    }).filter(v=>v!==null);

    let html = `
      <div class="evo-toggle">
        <button class="evo-btn ${evoRange==='hoy'?'active':''}" data-range="hoy">Hoy</button>
        <button class="evo-btn ${evoRange==='general'?'active':''}" data-range="general">Desde el inicio</button>
      </div>
      <div class="evo-chart-wrap">
        <p class="evo-chart-label">Valor total · ${evoRange==='hoy'?'hoy':'histórico completo'}</p>
        ${renderAreaChart(series, '#6C5CE7', 420, 130)}
      </div>
      <p class="evo-chart-label" style="margin-bottom:10px;">Por acción — toca para ver su gráfica</p>
    `;

    positions.forEach(p=>{
      const pts = p.isin ? historyPointsFor(p.isin, evoRange) : [];
      const values = pts.map(pt=>pt.v);
      const firstV = values[0], lastV = values[values.length-1];
      const rangeChangePct = (values.length>=2 && firstV) ? ((lastV-firstV)/firstV*100) : null;
      const open = openEvoRows.has(p.key);
      const color = colorFor(p.key);

      html += `
        <div class="evo-row ${open?'open':''}" data-key="${p.key}">
          <div class="evo-row-head">
            <span class="evo-name">${escapeHtml(p.name)}</span>
            <div class="evo-metrics">
              <div class="evo-metric">
                <div class="evo-metric-label">${evoRange==='hoy'?'Hoy':'Rango'}</div>
                <div class="${rangeChangePct===null?'':(rangeChangePct>=0?'pos':'neg')}">${rangeChangePct===null?'N/D':(rangeChangePct>=0?'+':'')+fmtPct(rangeChangePct)}</div>
              </div>
              <span class="evo-chevron">&#9656;</span>
            </div>
          </div>
          <div class="acc-wrap ${open?'open':''}"><div class="acc-inner"><div class="evo-detail-content">
            ${renderAreaChart(values, color, 400, 110)}
          </div></div></div>
        </div>
      `;
    });

    wrap.innerHTML = html;

    wrap.querySelectorAll('.evo-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{ evoRange = btn.dataset.range; renderActiveTab(); });
    });
    wrap.querySelectorAll('.evo-row-head').forEach(head=>{
      head.addEventListener('click', ()=>{
        const key = head.closest('.evo-row').dataset.key;
        if(openEvoRows.has(key)) openEvoRows.delete(key); else openEvoRows.add(key);
        renderActiveTab();
      });
    });
  }

  function renderDonut(positions, selKey){
    const size = 160, stroke = 22, r = (size-stroke)/2, c = 2*Math.PI*r;
    const total = positions.reduce((s,p)=>s+p.totalCost,0);
    let offset = 0;
    const segs = positions.map((p)=>{
      const pct = total>0 ? p.totalCost/total : 0;
      const dash = pct*c;
      const seg = { p, color: colorFor(p.key), dashoffset: -offset, dasharray: `${dash} ${c-dash}`, pct };
      offset += dash;
      return seg;
    });
    const circles = segs.map(seg=>{
      const dim = selKey && seg.p.key !== selKey ? 'dim' : '';
      return `<circle class="donut-seg ${dim}" data-key="${seg.p.key}" cx="${size/2}" cy="${size/2}" r="${r}"
        fill="none" stroke="${seg.color}" stroke-width="${stroke}"
        stroke-dasharray="${seg.dasharray}" stroke-dashoffset="${seg.dashoffset}"
        transform="rotate(-90 ${size/2} ${size/2})"/>`;
    }).join('');

    const selPos = selKey ? positions.find(p=>p.key===selKey) : null;
    const centerValue = selPos ? fmtPct((selPos.totalCost/total)*100) : fmtMoney(total);

    const legend = segs.map(seg=>{
      const active = selKey === seg.p.key;
      return `<div class="legend-item ${active?'active':''}" data-key="${seg.p.key}">
        <span class="legend-dot" style="background:${seg.color}"></span>
        <span class="legend-name">${escapeHtml(seg.p.name)}</span>
        <span class="legend-pct">${fmtPct(seg.pct*100)}</span>
      </div>`;
    }).join('');

    return `
      <div class="donut-section">
        <div class="donut-svg-wrap">
          <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${circles}</svg>
          <div class="donut-center">
            <p class="donut-center-label">${selPos?'% de la cartera':'Invertido'}</p>
            <p class="donut-center-value">${centerValue}</p>
          </div>
        </div>
        <div class="donut-legend">${legend}</div>
      </div>
    `;
  }

  const TABLE_COLS = [
    {key:'name', label:'Acción', fmt:v=>escapeHtml(v)},
    {key:'nops', label:'Op.', fmt:v=>v},
    {key:'totalShares', label:'Acc.', fmt:v=>fmtNum(v)},
    {key:'avgPrice', label:'P. medio', fmt:v=>fmtMoney(v)},
    {key:'totalCost', label:'Invertido', fmt:v=>fmtMoney(v)},
    {key:'currentPrice', label:'Actual', fmt:v=>v==null?'—':fmtMoney(v)},
    {key:'currentValue', label:'Valor', fmt:v=>v==null?'—':fmtMoney(v)},
    {key:'pnl', label:'Result. €', fmt:v=>v==null?'—':fmtMoney(v)},
    {key:'pnlPct', label:'Result. %', fmt:v=>v==null?'—':fmtPct(v)}
  ];

  function renderTabla(positions){
    const wrap = document.getElementById('tab-content');
    if(positions.length===0){
      wrap.innerHTML = '<div class="empty">Todavía no has añadido ninguna operación.</div>';
      return;
    }
    const rows = positions.map(p=>({
      key:p.key, name:p.name, isin:p.isin, nops:p.ops.length, totalShares:p.totalShares, avgPrice:p.avgPrice,
      totalCost:p.totalCost, currentPrice:p.currentPrice ?? null, currentValue:p.currentValue,
      pnl:p.pnl, pnlPct:p.pnlPct, source: p.isAuto?'Auto ⚡':(p.hasPrice?'Manual':'—'),
      realizedPnl:p.realizedPnl, dividends:p.dividends, totalCommission:p.totalCommission
    }));
    rows.sort((a,b)=>{
      const {key,dir} = tableSort;
      let av=a[key], bv=b[key];
      if(typeof av === 'string') return av.localeCompare(bv)*dir;
      av = av==null?-Infinity:av; bv = bv==null?-Infinity:bv;
      return (av-bv)*dir;
    });
    const totals = {
      totalCost: rows.reduce((s,r)=>s+r.totalCost,0),
      currentValue: rows.reduce((s,r)=> s+(r.currentValue??0),0),
      pnl: rows.reduce((s,r)=> s+(r.pnl??0),0),
      realizedPnl: rows.reduce((s,r)=> s+(r.realizedPnl||0),0),
      dividends: rows.reduce((s,r)=> s+(r.dividends||0),0),
      totalCommission: rows.reduce((s,r)=> s+(r.totalCommission||0),0),
    };

    const sel = selectedKey ? rows.find(r=>r.key===selectedKey) : null;
    let kpiHtml;
    if(sel){
      const pctOfPortfolio = totals.totalCost>0 ? (sel.totalCost/totals.totalCost*100) : 0;
      kpiHtml = `
        <div class="kpi-row">
          <div class="kpi-card"><p class="kpi-label">Invertido en ${escapeHtml(sel.name)}</p><p class="kpi-value">${fmtMoney(sel.totalCost)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Valor actual</p><p class="kpi-value">${sel.currentValue==null?'—':fmtMoney(sel.currentValue)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Resultado</p><p class="kpi-value ${sel.pnl==null?'':(sel.pnl>=0?'pos':'neg')}">${sel.pnl==null?'—':fmtMoney(sel.pnl)}</p></div>
          <div class="kpi-card"><p class="kpi-label">% de tu cartera</p><p class="kpi-value">${fmtPct(pctOfPortfolio)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Ganancia realizada</p><p class="kpi-value ${sel.realizedPnl>=0?'pos':'neg'}">${fmtMoney(sel.realizedPnl)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Dividendos</p><p class="kpi-value pos">${fmtMoney(sel.dividends)}</p></div>
          <button class="kpi-clear" id="kpi-clear-btn">✕ Ver cartera completa</button>
        </div>
      `;
    } else {
      kpiHtml = `
        <div class="kpi-row">
          <div class="kpi-card"><p class="kpi-label">Invertido total</p><p class="kpi-value">${fmtMoney(totals.totalCost)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Valor actual</p><p class="kpi-value">${fmtMoney(totals.currentValue)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Resultado no realizado</p><p class="kpi-value ${totals.pnl>=0?'pos':'neg'}">${fmtMoney(totals.pnl)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Posiciones</p><p class="kpi-value">${rows.length}</p></div>
          <div class="kpi-card"><p class="kpi-label">Ganancia realizada</p><p class="kpi-value ${totals.realizedPnl>=0?'pos':'neg'}">${fmtMoney(totals.realizedPnl)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Dividendos cobrados</p><p class="kpi-value pos">${fmtMoney(totals.dividends)}</p></div>
          <div class="kpi-card"><p class="kpi-label">Comisiones pagadas</p><p class="kpi-value">${fmtMoney(totals.totalCommission)}</p></div>
        </div>
      `;
    }

    const donutHtml = renderDonut(positions, selectedKey);

    let thead = '<tr>' + TABLE_COLS.map(c=>`<th data-key="${c.key}" class="${tableSort.key===c.key?'sorted':''}">${c.label}${tableSort.key===c.key?(tableSort.dir===1?' ▲':' ▼'):''}</th>`).join('') + '</tr>';
    let tbody = rows.map(r=>{
      const rowCls = selectedKey ? (r.key===selectedKey ? 'row-selected' : 'row-dim') : '';
      return `<tr class="${rowCls}" data-key="${r.key}">` + TABLE_COLS.map(c=>{
        let cellClass = '';
        if((c.key==='pnl'||c.key==='pnlPct') && r[c.key]!=null) cellClass = r[c.key]>=0 ? 'pos':'neg';
        return `<td class="${cellClass}">${c.fmt(r[c.key])}</td>`;
      }).join('') + '</tr>';
    }).join('');
    const tfoot = `<tr>
      <td colspan="4">Total</td>
      <td>${fmtMoney(totals.totalCost)}</td>
      <td></td>
      <td>${fmtMoney(totals.currentValue)}</td>
      <td class="${totals.pnl>=0?'pos':'neg'}">${fmtMoney(totals.pnl)}</td>
      <td class="${totals.pnl>=0?'pos':'neg'}">${totals.totalCost>0?fmtPct(totals.pnl/totals.totalCost*100):'—'}</td>
    </tr>`;

    wrap.innerHTML = kpiHtml + donutHtml + `<div class="table-wrap"><table class="data-table"><thead>${thead}</thead><tbody>${tbody}</tbody><tfoot>${tfoot}</tfoot></table></div>`;

    wrap.querySelectorAll('th[data-key]').forEach(th=>{
      th.addEventListener('click', ()=>{
        const key = th.dataset.key;
        if(tableSort.key === key) tableSort.dir *= -1;
        else tableSort = { key, dir: -1 };
        renderActiveTab();
      });
    });

    function toggleSelect(key){
      selectedKey = (selectedKey === key) ? null : key;
      renderActiveTab();
    }
    wrap.querySelectorAll('.donut-seg').forEach(seg=>{
      seg.addEventListener('click', ()=> toggleSelect(seg.dataset.key));
    });
    wrap.querySelectorAll('.legend-item').forEach(item=>{
      item.addEventListener('click', ()=> toggleSelect(item.dataset.key));
    });
    wrap.querySelectorAll('tbody tr[data-key]').forEach(tr=>{
      tr.addEventListener('click', ()=> toggleSelect(tr.dataset.key));
    });
    const clearBtn = document.getElementById('kpi-clear-btn');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{ selectedKey = null; renderActiveTab(); });
  }

  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(activeTab === btn.dataset.tab) return;
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b===btn));
      document.getElementById('section-label').textContent = SECTION_LABELS[activeTab];
      renderActiveTab();
    });
  });

  const modalOverlay = document.getElementById('modal-overlay');
  document.getElementById('open-modal-btn').addEventListener('click', ()=>{
    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    refreshIsinSelect();
  });
  function closeModal(){
    modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e=>{ if(e.target===modalOverlay) closeModal(); });

  function refreshIsinSelect(){
    const known = allKnownIsins();
    const entries = Object.entries(known);
    const note = document.getElementById('empty-isin-note');
    ['fe-isin','fs-isin','fd-isin'].forEach(id=>{
      const select = document.getElementById(id);
      select.innerHTML = entries.map(([isin,name])=>`<option value="${isin}">${escapeHtml(name)} · ${isin}</option>`).join('');
    });
    const anyForm = document.getElementById('txn-form-existing');
    if(entries.length === 0){
      note.style.display = 'block';
      anyForm.style.display = 'none';
    } else {
      note.style.display = 'none';
    }
    updateSellHoldingsNote();
  }

  function sharesHeldFor(isin){
    const positions = getPositions();
    const p = positions.find(pp=>pp.isin===isin);
    return p ? p.totalShares : 0;
  }

  function updateSellHoldingsNote(){
    const isin = document.getElementById('fs-isin').value;
    const note = document.getElementById('sell-holdings-note');
    if(!isin){ note.textContent=''; return; }
    const held = sharesHeldFor(isin);
    note.textContent = `Tienes ${fmtNum(held)} acciones de esta posición.`;
    document.getElementById('fs-shares').max = held;
  }

  const modeBtns = {
    new: document.getElementById('mode-new-btn'),
    existing: document.getElementById('mode-existing-btn'),
    sell: document.getElementById('mode-sell-btn'),
    div: document.getElementById('mode-div-btn'),
  };
  const modeForms = {
    new: document.getElementById('txn-form-new'),
    existing: document.getElementById('txn-form-existing'),
    sell: document.getElementById('txn-form-sell'),
    div: document.getElementById('txn-form-div'),
  };
  function setMode(mode){
    Object.entries(modeBtns).forEach(([k,btn])=> btn.classList.toggle('active', k===mode));
    Object.entries(modeForms).forEach(([k,form])=> form.style.display = (k===mode ? 'grid' : 'none'));
    refreshIsinSelect();
    if(mode!=='new' && Object.keys(allKnownIsins()).length===0){
      Object.values(modeForms).forEach(f=>f.style.display='none');
    }
  }
  modeBtns.new.addEventListener('click', ()=> setMode('new'));
  modeBtns.existing.addEventListener('click', ()=> setMode('existing'));
  modeBtns.sell.addEventListener('click', ()=> setMode('sell'));
  modeBtns.div.addEventListener('click', ()=> setMode('div'));
  document.getElementById('fs-isin').addEventListener('change', updateSellHoldingsNote);

  document.getElementById('txn-form-new').addEventListener('submit', async e=>{
    e.preventDefault();
    const errorEl = document.getElementById('form-error-new');
    errorEl.style.display='none';
    const ticker = document.getElementById('fn-ticker').value.trim();
    const isin = document.getElementById('fn-isin').value.trim().toUpperCase();
    const date = document.getElementById('fn-date').value;
    const shares = Number(document.getElementById('fn-shares').value);
    const price = Number(document.getElementById('fn-price').value);
    const commission = Number(document.getElementById('fn-commission').value || 0);

    if(!ticker || !isin || !date || !(shares>0) || !(price>0)){
      errorEl.textContent = 'Revisa los campos: nombre, ISIN, fecha, nº de acciones y precio son obligatorios.';
      errorEl.style.display='block'; return;
    }
    if(!/^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(isin)){
      errorEl.textContent = 'Ese ISIN no tiene el formato correcto (12 caracteres, ej. ES0148396007).';
      errorEl.style.display='block'; return;
    }
    const existingIsins = allKnownIsins();
    if(existingIsins[isin]){
      errorEl.textContent = `Ese ISIN ya está registrado como "${existingIsins[isin]}". Usa "Ampliar".`;
      errorEl.style.display='block'; return;
    }
    state.transactions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,7), ticker, isin, date, shares, price, commission, type:'buy' });
    await saveState();
    e.target.reset();
    document.getElementById('fn-commission').value = 0;
    document.getElementById('fn-date').valueAsDate = new Date();
    closeModal();
    render();
  });

  document.getElementById('txn-form-existing').addEventListener('submit', async e=>{
    e.preventDefault();
    const errorEl = document.getElementById('form-error-existing');
    errorEl.style.display='none';
    const isin = document.getElementById('fe-isin').value;
    const known = allKnownIsins();
    const ticker = known[isin];
    const date = document.getElementById('fe-date').value;
    const shares = Number(document.getElementById('fe-shares').value);
    const price = Number(document.getElementById('fe-price').value);
    const commission = Number(document.getElementById('fe-commission').value || 0);
    if(!isin || !ticker || !date || !(shares>0) || !(price>0)){
      errorEl.textContent = 'Revisa los campos: fecha, nº de acciones y precio son obligatorios.';
      errorEl.style.display='block'; return;
    }
    state.transactions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,7), ticker, isin, date, shares, price, commission, type:'buy' });
    await saveState();
    e.target.reset();
    document.getElementById('fe-commission').value = 0;
    document.getElementById('fe-date').valueAsDate = new Date();
    closeModal();
    render();
  });

  document.getElementById('txn-form-sell').addEventListener('submit', async e=>{
    e.preventDefault();
    const errorEl = document.getElementById('form-error-sell');
    errorEl.style.display='none';
    document.getElementById('wash-sale-warning').style.display='none';
    const isin = document.getElementById('fs-isin').value;
    const known = allKnownIsins();
    const ticker = known[isin];
    const date = document.getElementById('fs-date').value;
    const shares = Number(document.getElementById('fs-shares').value);
    const price = Number(document.getElementById('fs-price').value);
    const commission = Number(document.getElementById('fs-commission').value || 0);
    if(!isin || !ticker || !date || !(shares>0) || !(price>0)){
      errorEl.textContent = 'Revisa los campos: fecha, nº de acciones y precio son obligatorios.';
      errorEl.style.display='block'; return;
    }
    const held = sharesHeldFor(isin);
    if(shares > held){
      errorEl.textContent = `Solo tienes ${fmtNum(held)} acciones de esta posición — no puedes vender más de las que tienes.`;
      errorEl.style.display='block'; return;
    }
    state.transactions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,7), ticker, isin, date, shares, price, commission, type:'sell' });
    await saveState();
    const updated = getPositions().find(p=>p.isin===isin);
    e.target.reset();
    document.getElementById('fs-commission').value = 0;
    document.getElementById('fs-date').valueAsDate = new Date();
    if(updated && updated.washFlags && updated.washFlags.includes(date)){
      const warn = document.getElementById('wash-sale-warning');
      warn.textContent = '⚠ Esta venta genera pérdida y has comprado esta misma acción a menos de 2 meses — Hacienda podría no permitirte deducir esta pérdida (regla de los 2 meses). Revísalo antes de declarar.';
      warn.style.display = 'block';
    } else {
      closeModal();
    }
    render();
  });

  document.getElementById('txn-form-div').addEventListener('submit', async e=>{
    e.preventDefault();
    const errorEl = document.getElementById('form-error-div');
    errorEl.style.display='none';
    const isin = document.getElementById('fd-isin').value;
    const known = allKnownIsins();
    const ticker = known[isin];
    const date = document.getElementById('fd-date').value;
    const amount = Number(document.getElementById('fd-amount').value);
    if(!isin || !ticker || !date || !(amount>0)){
      errorEl.textContent = 'Revisa los campos: fecha e importe son obligatorios.';
      errorEl.style.display='block'; return;
    }
    state.dividends.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,7), ticker, isin, date, amount });
    await saveState();
    e.target.reset();
    document.getElementById('fd-date').valueAsDate = new Date();
    closeModal();
    render();
  });

  document.getElementById('fn-date').valueAsDate = new Date();
  document.getElementById('fe-date').valueAsDate = new Date();
  document.getElementById('fs-date').valueAsDate = new Date();
  document.getElementById('fd-date').valueAsDate = new Date();
  refreshIsinSelect();

  document.getElementById('bulk-import-btn').addEventListener('click', async ()=>{
    const feedback = document.getElementById('bulk-feedback');
    const raw = document.getElementById('bulk-input').value;
    const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
    if(lines.length===0){ feedback.textContent = 'Escribe al menos una línea.'; feedback.className = 'err'; return; }
    const today = new Date().toISOString().slice(0,10);
    let imported = 0; let errors = [];
    lines.forEach((line, idx)=>{
      const parts = line.split(';').map(p=>p.trim());
      if(parts.length !== 3 && parts.length !== 4){
        errors.push('Línea '+(idx+1)+': usa el formato Nombre; nº acciones; precio medio; ISIN (opcional)'); return;
      }
      const [ticker, sharesStr, priceStr, isinRaw] = parts;
      const shares = Number(sharesStr.replace(',', '.'));
      const price = Number(priceStr.replace(',', '.'));
      const isin = (isinRaw || '').toUpperCase();
      if(!ticker || !(shares>0) || !(price>0)){ errors.push('Línea '+(idx+1)+': revisa nombre, nº de acciones y precio'); return; }
      if(isin && !/^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(isin)){
        errors.push('Línea '+(idx+1)+': el ISIN "'+isin+'" no tiene el formato correcto, se importó sin ISIN');
      }
      const validIsin = isin && /^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(isin) ? isin : undefined;
      state.transactions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,7)+idx, ticker, isin: validIsin, date: today, shares, price, commission: 0 });
      imported++;
    });
    if(imported>0){ await saveState(); render(); }
    if(errors.length===0){
      feedback.textContent = imported+' importada'+(imported===1?'':'s')+'.';
      feedback.className = 'ok';
      document.getElementById('bulk-input').value = '';
    } else {
      feedback.textContent = imported+' importadas, '+errors.length+' con error.';
      feedback.className = 'err';
    }
  });

  loadState();
})();
</script>
